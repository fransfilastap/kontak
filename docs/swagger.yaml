definitions:
  pkg_http.APIKeyResponse:
    properties:
      api_key:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      key_prefix:
        type: string
      last_used_at:
        type: string
      name:
        type: string
    type: object
  pkg_http.CreateAPIKeyRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  pkg_http.CreateBroadcastRequest:
    properties:
      content:
        type: string
      cooldown:
        type: integer
      device_id:
        type: string
      message_type:
        type: string
      name:
        type: string
      recipients:
        items:
          type: string
        type: array
      scheduled_at:
        type: string
    required:
    - content
    - device_id
    - message_type
    - name
    - recipients
    type: object
  pkg_http.DeviceConnectionResponse:
    properties:
      message:
        type: string
      server_error:
        type: boolean
    type: object
  pkg_http.ErrorResponse:
    properties:
      context:
        type: string
      error:
        type: string
    type: object
  pkg_http.GenerateAPIKeyResponse:
    properties:
      api_key:
        type: string
    type: object
  pkg_http.GenericResponse:
    properties:
      message:
        type: string
    type: object
  pkg_http.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  pkg_http.LoginResponse:
    properties:
      token:
        type: string
    type: object
  pkg_http.MessageTemplateRequest:
    properties:
      content:
        type: string
      name:
        type: string
      variables:
        items: {}
        type: array
    required:
    - content
    - name
    type: object
  pkg_http.MessageType:
    enum:
    - text
    - image
    type: string
    x-enum-varnames:
    - MessageTypeText
    - MessageTypeMediaImage
  pkg_http.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  pkg_http.ScheduleMessageRequest:
    properties:
      scheduled_at:
        type: string
      text:
        type: string
      to:
        type: string
    required:
    - scheduled_at
    - text
    - to
    type: object
  pkg_http.SendInboxMessageRequest:
    properties:
      text:
        type: string
    required:
    - text
    type: object
  pkg_http.SendMessageRequest:
    properties:
      client_id:
        type: string
      mobile_number:
        type: string
      text:
        type: string
      type:
        $ref: '#/definitions/pkg_http.MessageType'
    required:
    - client_id
    - mobile_number
    - text
    - type
    type: object
  pkg_http.SendMessageResponse:
    properties:
      message_id:
        type: string
    type: object
  pkg_http.SendNewMessageRequest:
    properties:
      text:
        type: string
      to:
        type: string
    required:
    - text
    - to
    type: object
  pkg_http.SendTemplateMessageRequest:
    properties:
      deviceId:
        type: string
      templateId:
        type: string
      to:
        type: string
      variables:
        additionalProperties: true
        type: object
    required:
    - deviceId
    - templateId
    - to
    type: object
info:
  contact: {}
paths:
  /admin/broadcasts:
    get:
      consumes:
      - application/json
      description: Get all broadcast jobs for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              additionalProperties: true
              type: object
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List broadcasts
      tags:
      - broadcasts
    post:
      consumes:
      - application/json
      description: Create a new broadcast job to send messages to multiple recipients
      parameters:
      - description: Broadcast data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_http.CreateBroadcastRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create broadcast
      tags:
      - broadcasts
  /admin/broadcasts/{id}:
    get:
      consumes:
      - application/json
      description: Get a specific broadcast job with its recipients
      parameters:
      - description: Broadcast Job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
