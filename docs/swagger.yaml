        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_http.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get broadcast
      tags:
      - broadcasts
  /admin/clients:
    get:
      consumes:
      - application/json
      description: Get all devices for the authenticated user
      produces:
